name: Health APP - Deployment
on:
  push:
    branches: [main]
    paths:
      - "app/**"
permissions:
  actions: write
  checks: write
  pull-requests: write
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: app
  APP_TYPE_BUILD_TARGET: spa
  DOKPLOY_URL: "https://app.dokploy.com/api"
  DOKPLOY_APPLICATION_ID: "zwNwgertx4rFqxNV0AqhH"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set lower case owner name
        env:
          OWNER: "${{ github.repository_owner }}"
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: Dockerfile
          build-args: |
            APP=${{ env.IMAGE_NAME }}
          target: ${{ env.APP_TYPE_BUILD_TARGET }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/lara-health-${{ env.IMAGE_NAME }}:latest
          push: true

      - name: Trigger Dokploy deployment
        run: |
          curl -X 'POST' \
            '${{ env.DOKPLOY_URL }}/application.deploy' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}' \
            -d '{"applicationId": "${{ env.DOKPLOY_APPLICATION_ID }}" }'
